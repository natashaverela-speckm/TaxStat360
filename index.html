    <!-- JSON-LD: FAQPage (matches on-page FAQ content) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need a CPA — and does TaxStat360 replace one?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You don't need a CPA to use TaxStat360 — it's built for business owners, not accountants. You connect your accounting software (or enter your numbers manually), answer a few questions about your filing situation, and the platform handles the calculations. But it isn't a replacement for your CPA, and we don't try to be one: TaxStat360 is a tax planning and estimation tool, not a tax filing service. Think of it as the same year-round visibility your CPA has, available to you 365 days a year. Many users share their TaxStat360 dashboard with their CPA to make that relationship more productive — which is why many CPAs like it too."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate are the tax calculations?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TaxStat360 uses IRS-published tax rates, brackets, and rules for the tax year you select — choose your applicable year from the year dropdown in the Tax Tracker (Step 2 of the calculator) and all calculations update automatically to reflect the correct IRS rates for that year. Our calculations cover federal tax only (state taxes are not included) and encompass: federal income tax, self-employment tax, the §199A QBI deduction, estimated quarterly payments (with safe harbor), K-1 passthrough income, the 3.8% Net Investment Income Tax (NIIT), the 0.9% Additional Medicare Tax, and Alternative Minimum Tax (AMT). Results are designed for accurate planning estimates. For your actual filed return, always review with a tax professional."
          }
        },
        {
          "@type": "Question",
          "name": "What accounting software does TaxStat360 connect to?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TaxStat360 integrates with QuickBooks Online, Xero, Wave, and FreshBooks. Connect your account and we pull your profit and loss totals automatically — no manual data entry needed. If you don't use one of these platforms, or prefer not to connect, you can enter your revenue and expenses directly in the calculator. Manual entry takes under 2 minutes and gives you the same full analysis. More integrations are coming soon."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use TaxStat360 if I have multiple businesses?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Multiple entities is an Enterprise plan feature. On Enterprise you can track each business separately and see your consolidated federal tax exposure across all of them in one view. The Starter and Professional plans cover a single business entity."
          }
        },
        {
          "@type": "Question",
          "name": "Is my financial data secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. TaxStat360 uses bank-level 256-bit encryption and read-only API connections to your accounting software. We never have access to move or modify your money. Your data is never sold or shared with third parties."
          }
        },

          "name": "What is the 7-day free trial?",

            "text": "You get full access to all features on your selected plan for 7 days, completely free. You will not be charged until your 7-day trial ends. Cancel in one click before day 7 and you will never be billed. A payment method is required to activate your trial."
          }
        }
