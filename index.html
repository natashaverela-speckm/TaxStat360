    <!-- JSON-LD: FAQPage (matches on-page FAQ content) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need a CPA or accountant to use TaxStat360?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. TaxStat360 is built for business owners, not accountants. You connect your accounting software, answer a few questions about your filing situation, and the platform handles all the calculations. That said, many CPAs love TaxStat360 because it saves them time preparing for client meetings."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate are the tax calculations?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TaxStat360 uses IRS-published tax rates, brackets, and rules updated every tax year. Our calculations include federal income tax, self-employment tax, QBI deductions, estimated quarterly payments, and K-1 passthrough income. Results are highly accurate for planning purposes. For your actual filed return, we recommend reviewing with a tax professional."
          }
        },
        {
          "@type": "Question",
          "name": "What accounting software does TaxStat360 connect to?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We currently integrate with QuickBooks Online, Xero, Wave, and FreshBooks. We pull your profit and loss data directly so you never have to manually enter numbers. More integrations are coming soon."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use TaxStat360 if I have multiple businesses?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Professional and Enterprise plans support multiple entities. You can connect a separate accounting system for each business and see your consolidated tax exposure across all of them in one view."
          }
        },
        {
          "@type": "Question",
          "name": "Is my financial data secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. TaxStat360 uses bank-level 256-bit encryption and read-only API connections to your accounting software. We never have access to move or modify your money. Your data is never sold or shared with third parties."
          }
        },
        {
          "@type": "Question",
          "name": "What is the 7-day free trial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You get full access to all features on your selected plan for 7 days. A payment method is required to activate your trial. You will not be charged until your 7-day trial ends. Cancel anytime before day 7 and you will never be billed."
          }
        },
        {
          "@type": "Question",
          "name": "Does TaxStat360 replace my CPA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, and we do not try to. TaxStat360 is a tax management and planning tool, not a tax filing service. Think of it as giving you the same up-to-date visibility your CPA has, but available to you 365 days a year. Many of our users share their TaxStat360 dashboard with their CPA to make their relationship more productive."
          }
        }
      ]
    }
    </script>
